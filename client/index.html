<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>curdle</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="ui">
    <div id="status" data-state="connecting">connecting…</div>
    <button id="shuffle-toggle" data-on="false" title="Cycle shaders randomly">shuffle</button>
    <input id="shuffle-interval" type="number" min="3" max="300" value="15" title="Seconds per shader" />
    <button id="fps-toggle" data-on="false" title="Show FPS">fps</button>
    <select id="shader-picker" title="Shader"></select>
  </div>

  <div id="fps" hidden>-- fps</div>

  <div id="welcome" hidden>
    <h1>curdle</h1>
    <p>System audio visualizer. Make sure something's playing, then click anywhere to start.</p>
    <button id="start-btn">start</button>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
